name: Reusable industrial_ci workflow
# original author: Denis Štogl <denis@stoglrobotics.de>

on:
  workflow_call:
    inputs:
      ref_for_scheduled_build:
        description: 'Reference on which the repo should be checkout for scheduled build. Usually is this name of a branch or a tag.'
        default: ''
        required: false
        type: string

      upstream_workspace:
        description: 'UPSTREAM_WORKSPACE variable for industrial_ci. Usually path to local .repos file.'
        required: false
        default: ''
        type: string
      ros_distro:
        description: 'ROS_DISTRO variable for industrial_ci'
        required: true
        type: string
      ros_repo:
        description: 'ROS_REPO to run for industrial_ci. Possible values: "main", "testing"'
        default: 'main'
        required: false
        type: string
      before_install_upstream_dependencies:
        description: 'BEFORE_INSTALL_UPSTREAM_DEPENDENCIES variable for industrial_ci'
        default: ''
        required: false
        type: string
      ccache_dir:
        description: 'CCache dir that should be used. Relative to github.workspace'
        default: '.ccache'
        required: false
        type: string
      rosdep_skip_keys:
        description: "Skip those keys when doing 'rosdep install'. space-separated list"
        default: ''
        required: false
        type: string

jobs:
  reusable_ici:
    name: ${{ inputs.ros_distro }} ${{ inputs.ros_repo }}
    runs-on: ubuntu-latest
    env:
      # /tmp/ur_test_artifacts: collection point for test artifacts (e.g. VNC
      #     snapshots) written from inside the ICI container.
      # /tmp/ursim_urcaps: shared storage for the External Control URCap.
      #     Mounted at the same path in the ICI container AND used as the bind
      #     source for the URSim container that start_ursim.sh launches via the
      #     host docker daemon, so the URCap downloaded inside the ICI container
      #     is actually visible to URSim's /urcaps mount.
      # Both paths are kept outside ${{ github.workspace }} so they do not
      # collide with industrial_ci's read-only bind-mount of TARGET_REPO_PATH.
      DOCKER_RUN_OPTS: '-v /var/run/docker.sock:/var/run/docker.sock -v /tmp/ur_test_artifacts:/test_artifacts -v /tmp/ursim_urcaps:/tmp/ursim_urcaps -e UR_TEST_ARTIFACTS_DIR=/test_artifacts -e UR_CI_URCAP_FOLDER=/tmp/ursim_urcaps --network ursim_net --ip 192.168.56.1'
      CCACHE_DIR: ${{ github.workspace }}/${{ inputs.ccache_dir }}
      CACHE_PREFIX: ${{ inputs.ros_distro }}-${{ inputs.upstream_workspace }}-${{ inputs.ros_repo }}
      ROSDEP_SKIP_KEYS: ${{ inputs.rosdep_skip_keys }}
      TARGET_CMAKE_ARGS: -DCMAKE_CXX_FLAGS="-Werror -Wall -Wextra -Wpedantic -Wno-error=cpp"
    steps:
      - name: Checkout ${{ github.ref_name }} since build is not scheduled
        if: ${{ github.event_name != 'schedule' }}
        uses: actions/checkout@v7
      - name: Checkout ${{ inputs.ref_for_scheduled_build }} on scheduled build
        if: ${{ github.event_name == 'schedule' }}
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref_for_scheduled_build }}
      - run: docker network create --subnet=192.168.56.0/24 --gateway 192.168.56.254 ursim_net
        if: ${{ !env.ACT }}
      - name: Create shared host directories
        run: |
          mkdir -p /tmp/ur_test_artifacts /tmp/ursim_urcaps
          # Allow the container (running as root) to write here while keeping
          # the directory readable by the runner user for upload-artifact, and
          # writable by the host docker daemon when it bind-mounts /tmp/ursim_urcaps
          # into the URSim container.
          chmod 777 /tmp/ur_test_artifacts /tmp/ursim_urcaps
      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ env.CACHE_PREFIX }}-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ env.CACHE_PREFIX }}-${{ github.sha }}
            ccache-${{ env.CACHE_PREFIX }}
      - uses: 'ros-industrial/industrial_ci@master'
        env:
          UPSTREAM_WORKSPACE: ${{ inputs.upstream_workspace }}
          ROS_DISTRO: ${{ inputs.ros_distro }}
          ROS_REPO: ${{ inputs.ros_repo }}
          CMAKE_ARGS: -DUR_ROBOT_DRIVER_BUILD_INTEGRATION_TESTS=ON
          # ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'release') && '-DUR_ROBOT_DRIVER_RUN_ROBOT_MODELS_TEST=ON' || '' }}
          ADDITIONAL_DEBS: docker.io netcat-openbsd curl  # Needed for integration tests
          OS_CODE_NAME: ${{ inputs.ros_distro == 'rolling' && 'resolute' || '' }}

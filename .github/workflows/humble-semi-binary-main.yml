name: Humble Semi Binary Build Main
on:
  workflow_dispatch:
  pull_request:
    branches:
      - humble
  push:
    branches:
      - humble


jobs:
  humble_semi_main:
    uses: ./.github/workflows/reusable_ici.yml
    with:
      ros_distro: humble
      ros_repo: main
      upstream_workspace: Universal_Robots_ROS2_Driver.humble.repos
      ref_for_scheduled_build: humble
